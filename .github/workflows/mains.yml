 name: RumiOS Custom Core Prime Build Engine

on:
  workflow_dispatch:

jobs:
  build_nougat:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Local Repository Structure
      uses: actions/checkout@v4

    - name: Clean Runner Hard Drive Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf "/usr/local/share/boost"
        echo "======================================"
        echo "AVAILABLE STORAGE ON VIRTUAL HOST:"
        echo "======================================"
        df -h

    - name: Install Modern Baseline Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib gnupg gperf imagemagick libncurses-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python3-pip
        
        echo "deb http://security.ubuntu.com/ubuntu jammy-security main universe" | sudo tee /etc/apt/sources.list.d/jammy-lookaside.list
        sudo apt-get update
        sudo apt-get install -y libncurses5
        sudo rm /etc/apt/sources.list.d/jammy-lookaside.list
        sudo apt-get update
        
        sudo ln -sf /usr/bin/python3 /usr/bin/python

    - name: Deploy Secure Isolated Java 8 Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Deploy Google Source Repo Binary
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize LineageOS 14.1 Working Space
      run: |
        git config --global user.name "RumiOS-Automated"
        git config --global user.email "core@rumios.internal"
        mkdir -p build_workspace
        cd build_workspace
        repo init -u https://github.com/LineageOS/android.git -b cm-14.1 --git-lfs --depth=1

    - name: Inject Custom Local Tree Manifests
      run: |
        mkdir -p build_workspace/.repo/local_manifests
        cp local_manifests/roomservice.xml build_workspace/.repo/local_manifests/

    - name: Sync Down Core Android Source Tree
      run: |
        cd build_workspace
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --prune --fail-fast

    - name: Manual Force Injection of Hardware Trees
      run: |
        cd build_workspace
        echo "======================================================"
        echo "USING ANONYMOUS PROTOCOL BYPASS FOR HARDWARE INJECTION"
        echo "======================================================"
        
        # Uses explicit git:// handles to pull public assets cleanly without auth prompts
        git clone --depth=1 -b lineage-16.0 git://github.com/Galaxy-MSM8916/android_kernel_samsung_msm8916.git kernel/samsung/msm8916
        git clone --depth=1 -b lineage-16.0 git://github.com/Galaxy-MSM8916/android_device_samsung_msm8916-common.git device/samsung/msm8916-common
        git clone --depth=1 -b lineage-16.0 git://github.com/Galaxy-MSM8916/android_device_samsung_coreprimeelte.git device/samsung/coreprimeelte
        git clone --depth=1 -b lineage-16.0 git://github.com/Galaxy-MSM8916/proprietary_vendor_samsung.git vendor/samsung

    - name: Execute Cross-Compilation Routine
      run: |
        cd build_workspace
        source build/envsetup.sh
        export LC_ALL=C
        export USE_CCACHE=1
        ccache -M 30G
        breakfast coreprimeelte
        brunch coreprimeelte

    - name: Extract Flashed Flashable Archive Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: LineageOS-14.1-SMG360F-Custom
        path: build_workspace/out/target/product/coreprimeelte/*.zip
